{% extends "base.html" %}
{% block content %}
<h2>Your Shopping Cart</h2>

{% if items %}
<table>
    <tr>
        <th>Product</th>
        <th>Quantity</th>
        <th>Remove</th>
    </tr>
    {% for item in items %}
    <tr>
        <td>{{ item.product_item.product.name }}</td>
        <td>{{ item.quantity }}</td>
        <td>
            <a href="{% url 'remove_from_cart' item.id %}">Remove</a>
        </td>
    </tr>
    {% endfor %}
</table>
{% else %}
<p>Your cart is empty.</p>
{% endif %}

<a href="/">Continue Shopping</a>
{% endblock %}
